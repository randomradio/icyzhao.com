name: Publish site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: https://icyzhao.com
      SITE_CUSTOM_DOMAIN: icyzhao.com
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Notion content
        run: npm run import:notion

      - name: Validate content
        run: npm run validate:content

      - name: Commit imported Notion content
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "$(git status --porcelain content/notion)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/notion
            git commit -m "chore(content): import notion updates [skip ci]"
            git push
          else
            echo "No imported Notion content changes."
          fi

      - name: Discover subdomains
        run: npm run discover:subdomains

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Enforce HTTPS when certificate is ready
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api repos/${{ github.repository }}/pages \
            -X PUT \
            -f cname=icyzhao.com \
            -f build_type=workflow \
            -F https_enforced=true; then
            echo "HTTPS enforcement enabled."
          else
            echo "GitHub Pages certificate is not ready yet; HTTPS enforcement will be retried on the next publish."
          fi

  wechat:
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    continue-on-error: true
    env:
      SITE_BASE_URL: https://icyzhao.com
      WECHAT_MP_APP_ID: ${{ secrets.WECHAT_MP_APP_ID }}
      WECHAT_MP_APP_SECRET: ${{ secrets.WECHAT_MP_APP_SECRET }}
      WECHAT_PUBLISHER_HOST: ${{ secrets.WECHAT_PUBLISHER_HOST }}
      WECHAT_PUBLISHER_PORT: ${{ secrets.WECHAT_PUBLISHER_PORT }}
      WECHAT_PUBLISHER_USER: ${{ secrets.WECHAT_PUBLISHER_USER }}
      WECHAT_PUBLISHER_PATH: ${{ secrets.WECHAT_PUBLISHER_PATH }}
      WECHAT_PUBLISHER_SSH_KEY: ${{ secrets.WECHAT_PUBLISHER_SSH_KEY }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish optional WeChat channel
        run: npm run publish:wechat
